{% extends "base.html" %}

{% block title %}{{ article.title | e }} - {{ SITENAME | e }}{% endblock %}

{% block content %}
<article class="review">
    <div class="review-header">
        <div class="review-header__meta">
            <span class="ecosystem-badge ecosystem-badge--{{ article.tech_stack | lower }}">{{ article.tech_stack | default("General") | e }}</span>
            <span class="article-date">{{ article.date.strftime('%Y-%m-%d') }}</span>
        </div>
        <h1>{{ article.title | e }}</h1>
    </div>

    <div class="entry-content">
        {{ article.content }}
    </div>
</article>
{% endblock %}
